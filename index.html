<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Liar 2.5 - 時空の円卓審問</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0c0c;
            --panel-bg: rgba(20, 20, 20, 0.8);
            --accent: #d4af37;
            --npc-bubble: #1e1e1e;
            --user-bubble: #d4af37;
            --text-main: #e0e0e0;
        }
        body {
            font-family: 'Shippori Mincho', serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            height: 100dvh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }
        #app {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(180deg, #121212 0%, #050505 100%);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            border-left: 1px solid #222;
            border-right: 1px solid #222;
        }
        
        /* Chat Log */
        #chat-log {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }
        #chat-log::-webkit-scrollbar { width: 3px; }
        #chat-log::-webkit-scrollbar-thumb { background: #333; }

        .msg-container {
            display: flex;
            flex-direction: column;
            animation: msgIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }
        @keyframes msgIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .npc-msg { align-items: flex-start; }
        .user-msg { align-items: flex-end; }

        .speaker-info {
            font-size: 0.65rem;
            font-weight: bold;
            color: #888;
            margin-bottom: 6px;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .user-msg .speaker-info { flex-direction: row-reverse; color: var(--accent); }

        .bubble-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 85%;
        }
        .user-msg .bubble-group { flex-direction: row-reverse; }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #222;
            border: 1px solid #333;
            object-fit: cover;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .active-speaker .avatar {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            transform: scale(1.1);
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.6;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .npc-bubble {
            background: var(--npc-bubble);
            color: #fff;
            border-top-left-radius: 2px;
            border: 1px solid #333;
        }
        .user-bubble {
            background: var(--accent);
            color: #000;
            font-weight: bold;
            border-top-right-radius: 2px;
        }

        /* Interrupt Button (WAIT) */
        #wait-btn {
            position: absolute;
            right: 20px;
            bottom: 160px;
            width: 70px;
            height: 70px;
            background: #b91c1c;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            border: 3px solid #fff;
            box-shadow: 0 0 30px rgba(185, 28, 28, 0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #wait-btn:hover { transform: scale(1.1); }
        #wait-btn:active { transform: scale(0.9); }
        #wait-btn.paused { background: #444; border-color: #888; box-shadow: none; animation: none !important; }
        .pulse { animation: pulseAnim 2s infinite; }
        @keyframes pulseAnim { 0% { box-shadow: 0 0 0 0 rgba(185, 28, 28, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(185, 28, 28, 0); } 100% { box-shadow: 0 0 0 0 rgba(185, 28, 28, 0); } }

        /* Typing Dot */
        .typing { display: flex; gap: 4px; padding: 10px 15px; background: #1a1a1a; border-radius: 20px; width: fit-content; margin-bottom: 20px; }
        .dot { width: 5px; height: 5px; background: #555; border-radius: 50%; animation: bounce 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .system-banner {
            align-self: center;
            font-size: 0.65rem;
            color: var(--accent);
            background: rgba(212, 175, 55, 0.1);
            padding: 4px 12px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin: 10px 0;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="app">
        <div id="start-screen" class="absolute inset-0 z-[200] bg-black flex flex-col items-center justify-center p-10 text-center">
            <div class="mb-10 relative">
                <i data-lucide="shield-check" class="w-20 h-20 text-yellow-600 animate-pulse"></i>
            </div>
            <h1 class="text-4xl font-black mb-2 tracking-tighter text-white italic">History Liar <span class="text-yellow-600">2.5</span></h1>
            <p class="text-[10px] text-stone-500 mb-12 tracking-[0.4em] uppercase font-bold">Temporal Anomaly Division</p>
            
            <div class="w-full max-w-xs mb-10">
                <input type="password" id="api-key-input" class="w-full p-4 bg-stone-900 border border-stone-800 rounded-2xl text-center outline-none focus:border-yellow-600 transition-all text-white font-mono text-xs" placeholder="Gemini API Key (AIza...)">
                <p id="error-msg" class="hidden text-red-500 text-[10px] mt-4 bg-red-500/10 p-2 rounded-lg border border-red-500/20"></p>
            </div>

            <button onclick="initGame('bakumatsu')" class="w-full max-w-xs p-5 bg-white text-black font-black hover:bg-yellow-600 hover:text-white transition-all rounded-2xl shadow-2xl flex items-center justify-between group">
                <span>幕末：薩長同盟の密談</span>
                <i data-lucide="play" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
            </button>
        </div>

        <div id="game-header" class="hidden relative z-40 bg-black/80 backdrop-blur-md border-b border-white/5 p-4 pt-6">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <span class="w-1.5 h-1.5 bg-red-600 rounded-full animate-ping"></span>
                        <span id="era-tag" class="text-[8px] font-bold text-stone-500 tracking-widest uppercase">---</span>
                    </div>
                    <h2 id="scenario-title" class="text-sm font-bold text-white tracking-tight">---</h2>
                </div>
                <button onclick="location.reload()" class="p-2 text-stone-600 hover:text-white transition-colors"><i data-lucide="refresh-ccw" class="w-4 h-4"></i></button>
            </div>
            <div id="participant-bar" class="flex gap-3 overflow-x-auto no-scrollbar pb-1">
                </div>
        </div>

        <div id="chat-log" class="hidden">
            </div>

        <div id="typing-indicator" class="hidden px-6">
            <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>

        <div id="wait-btn" class="hidden pulse" onclick="toggleInterrupt()">
            <span class="text-[9px] font-bold uppercase tracking-tighter">Wait!</span>
            <span class="text-[13px] font-black">待った!</span>
        </div>

        <div id="input-area" class="hidden bg-stone-900/90 border-t border-white/5 p-4 pb-8 flex flex-col gap-3 z-50">
            <div id="mode-notice" class="text-[9px] text-center text-yellow-600 font-bold uppercase tracking-widest hidden mb-1">調査官の介入：証言を精査せよ</div>
            <div class="flex items-center gap-2 bg-black/40 p-1.5 rounded-2xl border border-white/10 focus-within:border-yellow-600 transition-all">
                <input type="text" id="user-input" class="flex-1 p-2.5 bg-transparent outline-none text-sm px-4 text-white placeholder-stone-600" placeholder="議論が停止しています..." disabled>
                <button id="send-btn" onclick="handleUserSubmit()" class="p-3 bg-stone-800 text-stone-500 rounded-xl transition-all" disabled>
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="flex gap-2">
                <button id="resume-btn" onclick="resumeLoop()" class="flex-[2] py-4 bg-stone-800 text-stone-500 text-[10px] font-black rounded-xl uppercase tracking-widest flex items-center justify-center gap-2 transition-all" disabled>
                    <i data-lucide="play-circle" class="w-4 h-4"></i> 議論を再開
                </button>
                <button id="vote-trigger" onclick="openVote()" class="flex-1 py-4 bg-red-900/50 text-red-500 border border-red-900/50 text-[10px] font-black rounded-xl uppercase tracking-widest hover:bg-red-700 hover:text-white transition-all">
                    告発
                </button>
            </div>
        </div>

        <div id="vote-modal" class="fixed inset-0 bg-black/95 z-[300] hidden flex items-center justify-center p-8 backdrop-blur-xl">
            <div class="bg-stone-900 border border-white/10 rounded-[2rem] w-full max-w-sm p-8 shadow-2xl">
                <div class="text-center mb-8">
                    <div class="inline-block p-4 bg-red-600/10 rounded-full mb-4">
                        <i data-lucide="gavel" class="w-8 h-8 text-red-600"></i>
                    </div>
                    <h3 class="font-black text-2xl text-white">真実の審判</h3>
                    <p class="text-[9px] text-stone-500 uppercase tracking-widest mt-1">Select the Liar</p>
                </div>
                <div id="vote-list" class="space-y-2 mb-8"></div>
                <div class="flex flex-col gap-2">
                    <button id="confirm-vote-btn" onclick="executeVerdict()" disabled class="w-full py-5 bg-red-700 text-white font-black rounded-2xl opacity-30 transition-all uppercase text-xs tracking-widest">告発を執行する</button>
                    <button onclick="closeVote()" class="w-full py-3 text-stone-500 font-bold text-[10px] uppercase">議論に戻る</button>
                </div>
            </div>
        </div>

        <div id="result-screen" class="hidden absolute inset-0 z-[400] bg-white flex flex-col items-center justify-center p-10 text-center text-black">
            <div id="result-visual" class="mb-10"></div>
            <h2 id="result-title" class="text-6xl font-black mb-4 italic tracking-tighter">---</h2>
            <p id="result-msg" class="text-sm text-stone-600 mb-10 leading-relaxed font-medium px-4"></p>
            <div class="w-full p-6 bg-stone-100 rounded-3xl mb-12 text-left border border-stone-200">
                <div class="text-[10px] font-black text-red-600 mb-2 tracking-widest uppercase flex items-center gap-1">
                    <i data-lucide="book-open" class="w-3 h-3"></i> Archive: 正史の記録
                </div>
                <span id="result-fact" class="text-xs leading-relaxed text-stone-800 font-bold"></span>
            </div>
            <button onclick="location.reload()" class="w-full py-5 bg-black text-white font-black rounded-2xl shadow-2xl active:scale-95 transition-transform uppercase tracking-[0.4em] text-[10px]">Return to Present</button>
        </div>
    </div>

    <script>
        const scenarios = {
            bakumatsu: {
                title: "薩長同盟の密談",
                era: "Kyoto 1866",
                characters: [
                    { id: 0, name: "坂本 龍馬", role: "仲介者", icon: "https://api.dicebear.com/7.x/avataaars/svg?seed=ryoma&eyebrows=angry" },
                    { id: 1, name: "西郷 隆盛", role: "薩摩代表", icon: "https://api.dicebear.com/7.x/avataaars/svg?seed=saigo" },
                    { id: 2, name: "桂 小五郎", role: "長州代表", icon: "https://api.dicebear.com/7.x/avataaars/svg?seed=katsura" }
                ],
                liarId: 0,
                liarSecret: "龍馬は『薩長同盟が成立した場所は、伏見の寺田屋である』と嘘をつきます。しかし事実は『京都の小松帯刀邸』です。龍馬はこれを絶対に認めず、寺田屋が歴史の舞台だと主張し続けてください。",
                fact: "薩長同盟は1866年に京都の小松帯刀邸（二本松薩摩藩邸説もあり）で成立しました。龍馬は直後に寺田屋で襲撃されたため混同されがちですが、締結の場所としては誤りです。"
            }
        };

        let currentScenario = null;
        let chatHistory = [];
        let isPaused = false;
        let isThinking = false;
        let loopTimer = null;
        let selectedVoteId = null;

        lucide.createIcons();

        const keyInput = document.getElementById('api-key-input');
        keyInput.value = localStorage.getItem('history_liar_v2_key') || '';

        async function initGame(key) {
            const apiKey = keyInput.value.trim();
            if (!apiKey) {
                showError("API Keyが必要です。");
                return;
            }
            localStorage.setItem('history_liar_v2_key', apiKey);
            currentScenario = scenarios[key];

            // UI Transition
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-header').classList.remove('hidden');
            document.getElementById('chat-log').classList.remove('hidden');
            document.getElementById('input-area').classList.remove('hidden');
            document.getElementById('wait-btn').classList.remove('hidden');
            document.getElementById('scenario-title').innerText = currentScenario.title;
            document.getElementById('era-tag').innerText = currentScenario.era;

            // Render Character Bar
            const bar = document.getElementById('participant-bar');
            bar.innerHTML = '';
            currentScenario.characters.forEach(c => {
                const div = document.createElement('div');
                div.id = `char-node-${c.id}`;
                div.className = "flex-shrink-0 flex items-center gap-2 bg-white/5 pr-4 rounded-full border border-white/5 opacity-40 transition-all duration-500";
                div.innerHTML = `
                    <img src="${c.icon}" class="w-8 h-8 rounded-full border border-white/10 avatar">
                    <span class="text-[10px] font-bold text-white whitespace-nowrap">${c.name}</span>
                `;
                bar.appendChild(div);
            });

            // Initial AI Setup
            const systemPrompt = `
あなたは歴史シミュレーションゲームのGM兼NPCです。
【シナリオ】${currentScenario.title}
【登場人物】${currentScenario.characters.map(c => `${c.name}(${c.role})`).join(', ')}
【ルール】
1. 嘘つきは「${currentScenario.characters[currentScenario.liarId].name}」です。
2. 嘘つきの偽証内容:「${currentScenario.liarSecret}」
3. 他のNPCは史実に基づき、嘘つきの矛盾を突いたり、議論を深めてください。
4. 返信は必ず以下のJSON形式の1オブジェクトのみで行ってください。余計な文章やマークダウンは一切含めないでください。
{"speaker": "名前", "target": "誰宛か", "text": "発言内容(100字以内)"}
5. ユーザーは「時空調査官」として途中で介入します。彼の指摘にはNPCとして動揺したり反論したりしてください。
            `;
            chatHistory.push({ role: "user", parts: [{ text: systemPrompt }] });
            appendSystemMessage("歴史の歪みを検知。調査を開始します...");
            
            lucide.createIcons();
            runDebateLoop();
        }

        async function runDebateLoop() {
            if (isPaused || isThinking) return;
            await callGemini();
            loopTimer = setTimeout(runDebateLoop, 3000 + Math.random() * 2000);
        }

        async function callGemini() {
            isThinking = true;
            toggleTyping(true);
            
            const apiKey = localStorage.getItem('history_liar_v2_key');
            
            // API送信用の履歴を一時的に作り、連続modelを防ぐ
            const apiHistory = [...chatHistory];
            if (apiHistory.length > 0 && apiHistory[apiHistory.length - 1].role === "model") {
                apiHistory.push({ role: "user", parts: [{ text: "他の誰か、史実や相手の矛盾点を踏まえて議論を続けてください。" }] });
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: apiHistory,
                        generationConfig: {
                            responseMimeType: "application/json"
                        }
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const rawText = data.candidates[0].content.parts[0].text;
                const cleanJson = extractJson(rawText);
                if (cleanJson) {
                    const msg = JSON.parse(cleanJson);
                    appendMessage(msg.speaker, msg.text, false, msg.target);
                    chatHistory.push({ role: "model", parts: [{ text: JSON.stringify(msg) }] });
                }
            } catch (err) {
                console.error("AI Error:", err);
                appendSystemMessage("通信エラー。再試行中...");
            } finally {
                isThinking = false;
                toggleTyping(false);
            }
        }

        function extractJson(str) {
            const match = str.match(/\{.*\}/s);
            return match ? match[0] : null;
        }

        function appendMessage(speaker, text, isUser, target = null) {
            const log = document.getElementById('chat-log');
            const container = document.createElement('div');
            container.className = `msg-container ${isUser ? 'user-msg' : 'npc-msg'}`;
            
            const char = currentScenario.characters.find(c => c.name === speaker);
            const icon = isUser ? "https://api.dicebear.com/7.x/bottts/svg?seed=investigator" : (char ? char.icon : "https://api.dicebear.com/7.x/initials/svg?seed=?");

            // Highlight bar
            if (!isUser && char) {
                currentScenario.characters.forEach(c => {
                    const el = document.getElementById(`char-node-${c.id}`);
                    el.classList.remove('opacity-100', 'active-speaker');
                    el.classList.add('opacity-40');
                });
                const activeEl = document.getElementById(`char-node-${char.id}`);
                activeEl.classList.add('opacity-100', 'active-speaker');
                activeEl.classList.remove('opacity-40');
            }

            container.innerHTML = `
                <div class="speaker-info">
                    <span>${speaker}</span>
                    ${target && target !== '全員' ? `<i data-lucide="arrow-right" class="w-2 h-2"></i><span>${target}</span>` : ''}
                </div>
                <div class="bubble-group">
                    <im
