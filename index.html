<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Liar 2.5 - 時空の円卓審問</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0c0c;
            --panel-bg: rgba(20, 20, 20, 0.8);
            --accent: #d4af37;
            --npc-bubble: #1e1e1e;
            --user-bubble: #06c755; /* LINE Green for investigator */
            --text-main: #e0e0e0;
        }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            height: 100dvh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }
        #app {
            width: 100%;
            max-width: 500px;
            background: #121212;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            border-left: 1px solid #222;
            border-right: 1px solid #222;
        }
        
        /* Chat Log */
        #chat-log {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
            background-color: #0b141a; /* WhatsApp/LINE dark background */
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 10px 10px;
        }
        #chat-log::-webkit-scrollbar { width: 4px; }
        #chat-log::-webkit-scrollbar-thumb { background: #333; }

        .msg-container {
            display: flex;
            flex-direction: column;
            animation: msgIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            max-width: 85%;
        }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .npc-msg { align-self: flex-start; }
        .user-msg { align-self: flex-end; }

        .speaker-name {
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 4px;
            margin-left: 48px;
        }
        .user-msg .speaker-name { display: none; }

        .bubble-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }
        .user-msg .bubble-wrapper { flex-direction: row-reverse; }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #222;
            border: 1px solid #333;
            flex-shrink: 0;
        }
        .user-msg .avatar { display: none; }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
            font-family: 'Shippori Mincho', serif;
        }
        .npc-bubble {
            background: #202c33; /* Darker bubble for others */
            color: #e9edef;
            border-top-left-radius: 2px;
        }
        .user-bubble {
            background: var(--user-bubble);
            color: #fff;
            font-weight: 500;
            border-top-right-radius: 2px;
        }
        
        .timestamp {
            font-size: 0.65rem;
            color: #888;
            margin-top: 4px;
        }
        .npc-msg .timestamp { margin-left: 48px; }
        .user-msg .timestamp { text-align: right; margin-right: 10px; }


        /* Wait/Interrupt Button */
        #wait-btn {
            position: absolute;
            right: 20px;
            bottom: 160px;
            width: 65px;
            height: 65px;
            background: #ef4444;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            border: 4px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }
        #wait-btn:active { transform: scale(0.9); }
        .pulse { animation: pulseAnim 2s infinite; }
        @keyframes pulseAnim { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* Indicator */
        .typing { display: flex; gap: 4px; padding: 10px; margin-left: 50px; }
        .dot { width: 6px; height: 6px; background: #555; border-radius: 50%; animation: bounce 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .system-msg {
            align-self: center;
            font-size: 0.7rem;
            background: rgba(255,255,255,0.05);
            color: #888;
            padding: 4px 12px;
            border-radius: 12px;
            margin: 10px 0;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        #vote-list button.selected {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- Start Screen -->
        <div id="start-screen" class="absolute inset-0 z-[200] bg-[#0b141a] flex flex-col items-center justify-center p-10 text-center">
            <div class="mb-6">
                <i data-lucide="history" class="w-16 h-16 text-emerald-500 mb-4 mx-auto"></i>
                <h1 class="text-3xl font-black text-white italic">History Liar <span class="text-emerald-500">2.5</span></h1>
                <p class="text-[10px] text-stone-500 tracking-[0.3em] uppercase mt-2">Temporal Investigation Unit</p>
            </div>
            
            <div class="w-full max-w-xs mb-8">
                <input type="password" id="api-key-input" class="w-full p-4 bg-stone-900 border border-stone-800 rounded-xl text-center outline-none focus:border-emerald-500 transition-all text-white text-xs" placeholder="Gemini API Key (AIza...)">
                <p id="error-msg" class="hidden text-red-500 text-[10px] mt-2"></p>
            </div>

            <button onclick="initGame('bakumatsu')" class="w-full max-w-xs p-4 bg-emerald-600 text-white font-bold hover:bg-emerald-500 transition-all rounded-xl shadow-lg flex items-center justify-center gap-2">
                <span>ミッション：幕末の密談</span>
                <i data-lucide="play" class="w-4 h-4"></i>
            </button>
        </div>

        <!-- Main Game Header -->
        <div id="game-header" class="hidden relative z-40 bg-[#202c33] p-4 flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-emerald-900 flex items-center justify-center">
                <i data-lucide="users" class="text-emerald-400 w-5 h-5"></i>
            </div>
            <div class="flex-1">
                <h2 id="scenario-title" class="text-sm font-bold text-white">---</h2>
                <p id="era-tag" class="text-[10px] text-stone-400">Loading...</p>
            </div>
            <div class="flex items-center gap-2">
                 <button class="p-2 text-stone-400"><i data-lucide="search" class="w-5 h-5"></i></button>
                 <button onclick="location.reload()" class="p-2 text-stone-400"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
        </div>

        <div id="chat-log" class="hidden"></div>

        <div id="typing-indicator" class="hidden">
            <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>

        <!-- Wait Button -->
        <div id="wait-btn" class="hidden pulse" onclick="toggleInterrupt()">
            <span class="text-[10px] font-bold uppercase text-white/80">Wait!</span>
            <span class="text-[14px] font-black text-white">待った!</span>
        </div>

        <!-- Input Area -->
        <div id="input-area" class="hidden bg-[#202c33] p-3 flex flex-col gap-2">
            <div id="mode-notice" class="text-[10px] text-center text-emerald-400 font-bold hidden">調査官の介入：証言を精査せよ</div>
            <div class="flex items-center gap-2">
                <input type="text" id="user-input" class="flex-1 p-3 bg-[#2a3942] outline-none text-sm rounded-xl text-white placeholder-stone-500" placeholder="議論が進行中..." disabled>
                <button id="send-btn" onclick="handleUserSubmit()" class="p-3 bg-emerald-600 text-white rounded-full opacity-50 cursor-not-allowed" disabled>
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </div>
            <div id="action-buttons" class="hidden flex gap-2 mt-1">
                <button id="resume-btn" onclick="resumeLoop()" class="flex-1 py-3 bg-[#2a3942] text-stone-400 text-[10px] font-bold rounded-lg uppercase transition-all" disabled>
                    <i data-lucide="play-circle" class="w-4 h-4 inline mr-1"></i> 再開
                </button>
                <button id="vote-trigger" onclick="openVote()" class="flex-1 py-3 bg-red-900/30 text-red-500 border border-red-900/50 text-[10px] font-bold rounded-lg uppercase">
                    <i data-lucide="gavel" class="w-4 h-4 inline mr-1"></i> 告発
                </button>
            </div>
        </div>

        <!-- Vote Modal -->
        <div id="vote-modal" class="fixed inset-0 bg-black/90 z-[300] hidden flex items-center justify-center p-6 backdrop-blur-sm">
            <div class="bg-[#202c33] rounded-2xl w-full max-w-sm p-6 shadow-2xl border border-white/10">
                <div class="text-center mb-6">
                    <h3 class="font-bold text-xl text-white">歴史の告発</h3>
                    <p class="text-[10px] text-stone-400 mt-1 uppercase tracking-widest">Identify the Liar</p>
                </div>
                <div id="vote-list" class="space-y-2 mb-6"></div>
                <div class="flex flex-col gap-2">
                    <button id="confirm-vote-btn" onclick="executeVerdict()" disabled class="w-full py-4 bg-red-600 text-white font-bold rounded-xl opacity-30">告発を執行する</button>
                    <button onclick="closeVote()" class="w-full py-2 text-stone-500 text-xs font-bold uppercase">戻る</button>
                </div>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden absolute inset-0 z-[400] bg-[#0b141a] flex flex-col items-center justify-center p-10 text-center">
            <div id="result-icon" class="mb-6"></div>
            <h2 id="result-title" class="text-4xl font-black mb-4 italic text-white">---</h2>
            <p id="result-msg" class="text-sm text-stone-400 mb-8 leading-relaxed"></p>
            <div class="w-full p-5 bg-[#202c33] rounded-xl mb-10 text-left border border-white/5">
                <div class="text-[10px] font-black text-emerald-500 mb-2 uppercase flex items-center gap-1">
                    <i data-lucide="book-open" class="w-3 h-3"></i> 史実の記録
                </div>
                <span id="result-fact" class="text-xs leading-relaxed text-stone-200"></span>
            </div>
            <button onclick="location.reload()" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-xl shadow-lg">タイトルに戻る</button>
        </div>
    </div>

    <script>
        const scenarios = {
            bakumatsu: {
                title: "薩長同盟の密談",
                era: "慶応二年 一月二十一日",
                characters: [
                    { id: 0, name: "坂本龍馬", role: "仲介者", icon: "https://api.dicebear.com/7.x/avataaars/svg?seed=ryoma&eyebrows=angry&mouth=serious" },
                    { id: 1, name: "西郷隆盛", role: "薩摩藩代表", icon: "https://api.dicebear.com/7.x/avataaars/svg?seed=saigo&top=shortHair&facialHair=beardLight" },
                    { id: 2, name: "桂小五郎", role: "長州藩代表", icon: "https://api.dicebear.com/7.x/avataaars/svg?seed=katsura&top=longHair&hairColor=2c1b18" }
                ],
                liarId: 0,
                liarSecret: "あなたは坂本龍馬です。史実では同盟は『小松帯刀邸』で結ばれましたが、あなたはあえて『伏見の寺田屋で結んだ』と嘘をつき続けてください。他の二人に場所を突っ込まれても、寺田屋が歴史の舞台だと主張してください。",
                fact: "薩長同盟は1866年、京都にある薩摩藩家老・小松帯刀の別邸で締結されました。坂本龍馬はその直後に寺田屋で襲撃を受けたため、場所が混同されることがありますが、締結場所は寺田屋ではありません。"
            }
        };

        let currentScenario = null;
        let chatHistory = [];
        let isPaused = false;
        let isThinking = false;
        let loopTimer = null;
        let selectedVoteId = null;

        lucide.createIcons();

        // Load Key
        const keyInput = document.getElementById('api-key-input');
        keyInput.value = localStorage.getItem('history_liar_key_v2.5') || '';

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.innerText = msg;
            el.classList.remove('hidden');
        }

        async function initGame(scenarioKey) {
            const apiKey = keyInput.value.trim();
            if (!apiKey) {
                showError("Gemini API Keyを入力してください。");
                return;
            }
            localStorage.setItem('history_liar_key_v2.5', apiKey);
            currentScenario = scenarios[scenarioKey];

            // Transitions
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-header').classList.remove('hidden');
            document.getElementById('chat-log').classList.remove('hidden');
            document.getElementById('input-area').classList.remove('hidden');
            document.getElementById('wait-btn').classList.remove('hidden');
            
            document.getElementById('scenario-title').innerText = currentScenario.title;
            document.getElementById('era-tag').innerText = currentScenario.era;

            // System Setup
            const systemPrompt = `
あなたは歴史ミステリーゲームのGM兼NPCです。
【シナリオ】${currentScenario.title}
【設定】${currentScenario.era}
【登場人物】
1. ${currentScenario.characters[0].name}（${currentScenario.characters[0].role}）
2. ${currentScenario.characters[1].name}（${currentScenario.characters[1].role}）
3. ${currentScenario.characters[2].name}（${currentScenario.characters[2].role}）

【嘘つきの指示】
${currentScenario.characters[currentScenario.liarId].name}は嘘をついています。内容は「${currentScenario.liarSecret}」です。
他のNPCは史実を知っており、矛盾を感じたら厳しく追及してください。

【ルール】
- 応答は必ず次のJSON形式の1オブジェクトのみにしてください: {"speaker": "名前", "text": "発言内容"}
- 1回の発言は60文字以内で、非常に短くテンポよく。
- ユーザーは「時空調査官」です。彼の介入があったら、NPCとしてそれに対応してください。
- 議論を開始してください。まずは誰か一人が発言してください。
            `;
            chatHistory.push({ role: "user", parts: [{ text: systemPrompt }] });
            
            appendSystemMessage("時空の歪みを検知。議論の傍受を開始します。");
            runDebateLoop();
        }

        async function runDebateLoop() {
            if (isPaused || isThinking) return;
            await callGemini();
            // Schedule the next turn only if the game is not paused
            if (!isPaused) {
                loopTimer = setTimeout(runDebateLoop, 5000 + Math.random() * 3000);
            }
        }

        async function callGemini(userText = null) {
            isThinking = true;
            if (!userText) toggleTyping(true);

            const apiKey = localStorage.getItem('history_liar_key_v2.5');
            const prompt = userText || "議論を続けてください。誰か一人が発言してください。";
            
            // Add the new prompt to a temporary history to send to the API
            const currentTurnHistory = [...chatHistory, { role: "user", parts: [{ text: prompt }] }];

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: currentTurnHistory,
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error.message || `API Error: ${response.status}`);
                }
                
                const data = await response.json();

                if (!data.candidates || data.candidates.length === 0 || !data.candidates[0].content) {
                     throw new Error('APIから有効な応答がありませんでした。');
                }
                
                const resText = data.candidates[0].content.parts[0].text;
                const msgObj = JSON.parse(resText);

                // Add the user prompt and model response to the main history
                chatHistory.push({ role: "user", parts: [{ text: prompt }] });
                chatHistory.push({ role: "model", parts: [{ text: resText }] });

                appendMessage(msgObj.speaker, msgObj.text, false);

            } catch (err) {
                console.error(err);
                appendSystemMessage(`通信エラー: ${err.message}`);
                if (err.message.includes("API key not valid")) {
                    appendSystemMessage("APIキーが無効です。リロードして再入力してください。");
                    clearTimeout(loopTimer);
                }
            } finally {
                isThinking = false;
                toggleTyping(false);
            }
        }
        
        function appendMessage(speaker, text, isUser) {
            const log = document.getElementById('chat-log');
            const msgNode = document.createElement('div');
            msgNode.className = `msg-container ${isUser ? 'user-msg' : 'npc-msg'}`;

            const char = currentScenario.characters.find(c => c.name === speaker);
            const avatarUrl = isUser ? "" : (char?.icon || "https://api.dicebear.com/7.x/initials/svg?seed=?");
            const timestamp = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });

            msgNode.innerHTML = `
                ${!isUser ? `<div class="speaker-name">${speaker}</div>` : ''}
                <div class="bubble-wrapper">
                    ${!isUser ? `<img src="${avatarUrl}" class="avatar">` : ''}
                    <div class="bubble ${isUser ? 'user-bubble' : 'npc-bubble'}">${text.replace(/\n/g, '<br>')}</div>
                </div>
                <div class="timestamp">${timestamp}</div>
            `;
            log.appendChild(msgNode);
            log.scrollTop = log.scrollHeight;
        }


        function appendSystemMessage(text) {
            const log = document.getElementById('chat-log');
            const div = document.createElement('div');
            div.className = "system-msg";
            div.innerText = text;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function toggleTyping(show) {
            document.getElementById('typing-indicator').classList.toggle('hidden', !show);
            const log = document.getElementById('chat-log');
            if (show) log.scrollTop = log.scrollHeight;
        }

        function toggleInterrupt() {
            isPaused = true;
            clearTimeout(loopTimer);

            const btn = document.getElementById('wait-btn');
            const input = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');
            const resumeBtn = document.getElementById('resume-btn');
            const actionBtns = document.getElementById('action-buttons');
            const notice = document.getElementById('mode-notice');

            btn.classList.remove('pulse', 'bg-red-500');
            btn.classList.add('bg-stone-600');
            btn.innerHTML = `<i data-lucide="mic" class="w-7 h-7 text-white"></i>`;
            lucide.createIcons();

            input.disabled = false;
            input.placeholder = "矛盾を指摘する、または質問する...";
            input.focus();
            sendBtn.disabled = false;
            sendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            
            actionBtns.classList.remove('hidden');
            resumeBtn.disabled = false;
            resumeBtn.classList.add('text-emerald-500');
            notice.classList.remove('hidden');
            appendSystemMessage("議論を一時停止しました。介入が可能です。");
        }

        function resumeLoop() {
            isPaused = false;
            const btn = document.getElementById('wait-btn');
            const input = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');
            const resumeBtn = document.getElementById('resume-btn');
            const actionBtns = document.getElementById('action-buttons');
            const notice = document.getElementById('mode-notice');

            btn.classList.add('pulse', 'bg-red-500');
            btn.classList.remove('bg-stone-600');
            btn.innerHTML = `<span class="text-[10px] font-bold uppercase text-white/80">Wait!</span><span class="text-[14px] font-black text-white">待った!</span>`;

            input.disabled = true;
            input.value = "";
            input.placeholder = "議論が進行中...";
            sendBtn.disabled = true;
            sendBtn.classList.add('opacity-50', 'cursor-not-allowed');
            
            actionBtns.classList.add('hidden');
            resumeBtn.disabled = true;
            resumeBtn.classList.remove('text-emerald-500');
            notice.classList.add('hidden');
            appendSystemMessage("議論を再開します。");
            
            runDebateLoop();
        }

        async function handleUserSubmit() {
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if (!val || isThinking) return;

            input.value = "";
            appendMessage("調査官", val, true);
            await callGemini(`調査官（ユーザー）がこう介入しました: 「${val}」 これに反応して議論を続けてください。`);
            
            // After user submits, we resume the automatic loop.
            if(isPaused) {
                resumeLoop();
            }
        }

        function openVote() {
            clearTimeout(loopTimer);
            if (!isPaused) toggleInterrupt(); // Pause the game if it's not already
            const modal = document.getElementById('vote-modal');
            const list = document.getElementById('vote-list');
            list.innerHTML = '';
            
            currentScenario.characters.forEach(c => {
                const btn = document.createElement('button');
                btn.className = "w-full flex items-center gap-4 p-3 bg-[#2a3942] rounded-xl border-2 border-transparent transition-all text-white hover:bg-[#3c4a52]";
                btn.innerHTML = `
                    <img src="${c.icon}" class="w-10 h-10 rounded-full">
                    <div class="text-left">
                        <div class="text-sm font-bold">${c.name}</div>
                        <div class="text-[10px] text-stone-400">${c.role}</div>
                    </div>
                `;
                btn.onclick = () => {
                    document.querySelectorAll('#vote-list button').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedVoteId = c.id;
                    const confirmBtn = document.getElementById('confirm-vote-btn');
                    confirmBtn.disabled = false;
                    confirmBtn.classList.remove('opacity-30');
                };
                list.appendChild(btn);
            });
            modal.classList.remove('hidden');
        }

        function closeVote() {
            document.getElementById('vote-modal').classList.add('hidden');
            // Do not resume automatically, let user click resume.
        }

        function executeVerdict() {
            const isCorrect = selectedVoteId === currentScenario.liarId;
            const resultScreen = document.getElementById('result-screen');
            const iconBox = document.getElementById('result-icon');
            const title = document.getElementById('result-title');
            const msg = document.getElementById('result-msg');
            const fact = document.getElementById('result-fact');

            document.getElementById('vote-modal').classList.add('hidden');

            if (isCorrect) {
                iconBox.innerHTML = '<i data-lucide="shield-check" class="w-20 h-20 text-emerald-500"></i>';
                title.innerText = "SUCCESS";
                title.className = "text-5xl font-black mb-4 italic text-emerald-500";
                msg.innerText = "見事です。歴史の矛盾を特定し、正しい時間軸を保護しました。";
            } else {
                iconBox.innerHTML = '<i data-lucide="shield-alert" class="w-20 h-20 text-red-500"></i>';
                title.innerText = "FAILURE";
                title.className = "text-5xl font-black mb-4 italic text-red-500";
                msg.innerText = `告発は退けられました。真の嘘つきは${currentScenario.characters[currentScenario.liarId].name}でした。歴史は歪んだまま固定されてしまいました...`;
            }

            fact.innerText = currentScenario.fact;
            resultScreen.classList.remove('hidden');
            lucide.createIcons();
        }

        // Enter key support
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleUserSubmit();
        });
    </script>
</body>
</html>
